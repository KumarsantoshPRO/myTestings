# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "3.1"
metadata:
  name: com.udhg.zprintrfqform
type: application
builder:
  customTasks:
    - name: ui5-tooling-transpile-task
      afterTask: replaceVersion
      configuration:
        debug: true
        transformModulesToUI5:
          overridesToOverride: true
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: NLX080_SAML_ASSERTION
          url: https://my418069.s4hana.cloud.sap
          authenticationType: reentranceTicket # SAML support for vscode
        app:
          name: ZPRINT
          description: Print Bill
          package: $TMP
          transport: $TMP
        exclude:
          - /test/
  resources:
    excludes:
      - /test/**
      - /localService/**
